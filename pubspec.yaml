name: notemind_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
  image_path: "assets/icon/icon.png"
dependencies:
  flutter:
    sdk: flutter
  video_player_win: ^3.0.0
  video_player_web: ^2.3.4
  video_player: ^2.9.1
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.6

  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  shared_preferences: ^2.5.5
  http: ^1.6.0
  path: ^1.9.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true